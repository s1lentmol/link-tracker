services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: linktracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d linktracker"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  migrate:
    image: migrate/migrate:v4.18.3
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://postgres:postgres@postgres:5432/linktracker?sslmode=disable",
        "up"
      ]

  scrapper:
    build:
      context: .
      dockerfile: cmd/scrapper/Dockerfile
    env_file:
      - .env
    environment:
      SCRAPPER_GRPC_ADDR: ":8081"
      BOT_GRPC_ADDR: "bot:8082"
      DB_DSN: "postgres://postgres:postgres@postgres:5432/linktracker?sslmode=disable"
      DB_MIGRATIONS_PATH: "/migrations"
      DB_AUTO_MIGRATE: "true"
      DB_ACCESS_TYPE: "${DB_ACCESS_TYPE:-sql}"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    expose:
      - "8081"
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: cmd/bot/Dockerfile
    env_file:
      - .env
    environment:
      BOT_GRPC_ADDR: ":8082"
      SCRAPPER_GRPC_ADDR: "scrapper:8081"
    depends_on:
      - scrapper
    expose:
      - "8082"
    restart: unless-stopped

volumes:
  pgdata:

syntax = "proto3";

package linktracker.v1;

option go_package = "gitlab.education.tbank.ru/backend-academy-go-2025/homeworks/link-tracker/shared/pb;pb";

service ScrapperService {
  rpc RegisterChat(RegisterChatRequest) returns (RegisterChatResponse);
  rpc DeleteChat(DeleteChatRequest) returns (DeleteChatResponse);
  rpc ListLinks(ListLinksRequest) returns (ListLinksResponse);
  rpc AddLink(AddLinkRequest) returns (LinkResponse);
  rpc RemoveLink(RemoveLinkRequest) returns (LinkResponse);
}

service BotService {
  rpc SendUpdate(LinkUpdate) returns (SendUpdateResponse);
}

message RegisterChatRequest {
  int64 chat_id = 1;
}

message RegisterChatResponse {}

message DeleteChatRequest {
  int64 chat_id = 1;
}

message DeleteChatResponse {}

message ListLinksRequest {
  int64 chat_id = 1;
}

message AddLinkRequest {
  int64 chat_id = 1;
  string link = 2;
  repeated string tags = 3;
  repeated string filters = 4;
}

message RemoveLinkRequest {
  int64 chat_id = 1;
  string link = 2;
}

message LinkResponse {
  int64 id = 1;
  string url = 2;
  repeated string tags = 3;
  repeated string filters = 4;
}

message ListLinksResponse {
  repeated LinkResponse links = 1;
  int32 size = 2;
}

message ApiErrorResponse {
  string description = 1;
  string code = 2;
  string exception_name = 3;
  string exception_message = 4;
  repeated string stacktrace = 5;
}

message LinkUpdate {
  int64 id = 1;
  string url = 2;
  string description = 3;
  repeated int64 tg_chat_ids = 4;
}

message SendUpdateResponse {}

---
variables:
  GO_VERSION: "1.25"
  GO_LINTER_VERSION: "v2.3"
  GOPATH: "$CI_PROJECT_DIR/.go"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .go/pkg/mod/

stages:
  - check
  - build

lint:
  stage: check
  image: golangci/golangci-lint:${GO_LINTER_VERSION}-alpine
  script:
    - golangci-lint run -c golangci.yml --timeout=5m
  allow_failure: false

test:
  stage: check
  image: golang:${GO_VERSION}-alpine
  script:
    - apk add --no-cache gcc musl-dev
    - go test -race -cover -count=1 ./...
  allow_failure: false

build:
  stage: build
  image: golang:${GO_VERSION}-alpine
  script:
    - mkdir -p bin
    - for d in cmd/*; do
        name="$(basename "$d")";
        echo "Building $name";
        go build -o "bin/$name" "./cmd/$name";
      done
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH =~ /^(master|main)$/'
    - when: never
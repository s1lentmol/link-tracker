version: "2"

# Limit the number of identical issues reported
issues:
  max-same-issues: 20

formatters:
  enable:
    - goimports             # Format and sort imports 

linters:
  enable:
    - asciicheck            # Reject non-ASCII identifiers for portability and clarity
    - bodyclose             # Ensure HTTP response bodies are properly closed
    - copyloopvar           # Detect accidental copying of loop variables into closures
    - cyclop                # Check cyclomatic complexity of functions and packages
    - dupl                  # Detect duplicated code blocks (copy-paste)
    - errcheck              # Enforce checking of returned errors to avoid silent failures
    - errname               # Enforce naming: sentinel errors as ErrXXX, types as XXXError
    - errorlint             # Catch issues with Go 1.13+ error wrapping (errors.Is/As)
    - exhaustive            # Ensure switch statements over enums cover all cases
    - funcorder             # Enforce consistent order of functions, methods, and constructors
    - funlen                # Flag functions that are too long (by lines or statements)
    - gocognit              # Check cognitive complexity — how hard a function is to understand
    - goconst               # Detect repeated string literals that could be constants
    - gocritic              # Find bugs, performance issues, and style problems
    - goprintffuncname      # Enforce printf-style funcs to end with 'f' (e.g., Debugf)
    - govet                 # Detect common mistakes: wrong printf args, struct alignment, etc.
    - ineffassign           # Find assignments that are never used
    - intrange              # Suggest for-range over slices instead of indexed loops
    - loggercheck           # Validate key-value pairs in structured logging (zap, logr, etc.)
    - mnd                   # Detect magic numbers without context or explanation
    - musttag               # Require struct tags (json, xml, etc.) for (un)marshaled fields
    - nestif                # Warn on deeply nested if statements (reduces readability)
    - nilnil                # Prevent returning (nil, nil) when an error is expected
    - noctx                 # Catch HTTP requests made without context (risk of resource leaks)
    - nolintlint            # Validate correctness and completeness of //nolint directives
    - perfsprint            # Suggest faster alternatives to fmt.Sprintf
    - reassign              # Prevent reassignment of global variables
    - recvcheck             # Enforce consistent receiver names across methods of a type
    - revive                # Modern linter: style, naming, comments, and best practices
    - staticcheck           # Advanced static analysis: bugs, performance, deprecated APIs
    - testifylint           # Improve usage of testify (e.g., require vs assert, message clarity)
    - tparallel             # Detect misuse of t.Parallel() in subtests
    - unconvert             # Remove unnecessary type conversions
    - unparam               # Find unused function parameters
    - unused                # Detect unused code: vars, funcs, types, consts
    - usetesting            # Suggest modern testing features (e.g., t.Cleanup)
    - wastedassign          # Detect assignments overwritten before first use
    - wrapcheck             # Ensure external errors are wrapped (not exposed directly)
    - decorder              # Enforce declaration order: types → consts → vars → funcs

  settings:
    cyclop:
      # Maximum cyclomatic complexity allowed per function
      max-complexity: 30

    errcheck:
      # Require checking of type assertion results (e.g., v, ok := x.(T))
      # Default: false
      check-type-assertions: true

    funlen:
      # Maximum number of lines per function
      # Default: 60
      lines: 90

    govet:
      # Enable all analyzers.
      # Default: false
      enable-all: true
      # Disable analyzers by name.
      # Default: []
      disable:
        - fieldalignment
      # Settings per analyzer.
      settings:
        shadow:
          # Be strict about variable shadowing (can hide bugs)
          # Default: false
          strict: true

    nolintlint:
      # These linters don't require explanations in //nolint
      # Default: []
      allow-no-explanation: [ funlen, gocognit ]
      # Require a non-empty explanation after //nolint
      # Default: false
      require-explanation: true
      # Require explicit linter name in //nolint directive
      # Default: false
      require-specific: true

    perfsprint:
      # Disable suggesting string concatenation
      # Default: true
      strconcat: false

    reassign:
      # Prevent reassignment of all global variables
      # Default: ["EOF", "Err.*"]
      patterns:
        - ".*"

    staticcheck:
      # Example (to disable some checks): [ "all", "-SA1000", "-SA1001"]
      # Default: ["all", "-ST1000", "-ST1003", "-ST1016", "-ST1020", "-ST1021", "-ST1022"]
      checks:
        - all
        # Incorrect or missing package comment.
        - -ST1000
        # Use consistent method receiver names.
        - -QF1008


  exclusions:
    # Predefined exclusion rules.
    # Default: []
    rules:
      - text: 'should have a package comment'
        linters: [ revive ]
      - text: 'exported \S+ \S+ should have comment( \(or a comment on this block\))? or be unexported'
        linters: [ revive ]
      - text: 'package comment should be of the form ".+"'
        source: '// ?(nolint|TODO)'
        linters: [ revive ]
      - text: 'comment on exported \S+ \S+ should be of the form ".+"'
        source: '// ?(nolint|TODO)'
        linters: [ revive, staticcheck ]
      - path: '_test\.go'
        linters:
          - bodyclose
          - dupl
          - errcheck
          - funlen
          - goconst
          - noctx
          - wrapcheck
